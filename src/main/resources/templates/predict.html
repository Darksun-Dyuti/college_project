<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Make Prediction - Cost Prediction System')}"></head>
<body>
    
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container container-sm animate-fade-in" style="padding-top: 3rem; padding-bottom: 5rem; flex: 1;">
        
        <nav aria-label="breadcrumb" style="margin-bottom: 1.5rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem;">
                <a th:href="@{/dashboard}" style="color: var(--text-secondary); text-decoration: none; transition: color 0.2s;">Dashboard</a>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                <span style="color: var(--text-primary); font-weight: 500;">Make Prediction</span>
            </div>
        </nav>

        <div style="margin-bottom: 2rem;">
            <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Make a Prediction</h1>
            <p style="color: var(--text-secondary);">Enter your details below to get an estimated insurance cost</p>
        </div>

        <div class="card">
            <form id="predictionForm">
                
                <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); color: var(--primary-color);">Basic Information</h3>
                <div class="grid-cols-2" style="margin-bottom: 2rem;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="age">Age</label>
                        <input type="number" id="age" name="age" class="form-control" min="1" max="120" required placeholder="Enter your age">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="bmi">BMI</label>
                        <input type="number" id="bmi" name="bmi" class="form-control" min="10" max="80" step="0.1" required placeholder="Enter your BMI">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="gender">Gender</label>
                        <select id="gender" name="gender" class="form-control" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="kids">Number of Children</label>
                        <input type="number" id="kids" name="kids" class="form-control" min="0" max="10" required placeholder="Number of kids">
                    </div>
                </div>

                <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); color: var(--primary-color);">Lifestyle & Region</h3>
                <div class="grid-cols-2" style="margin-bottom: 2rem;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="smoker">Smoker</label>
                        <select id="smoker" name="smoker" class="form-control" required>
                            <option value="">Select</option>
                            <option value="false">No</option>
                            <option value="true">Yes</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="state">State</label>
                        <select id="state" name="state" class="form-control" required>
                            <option value="">Select State</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Maharashtra">Maharashtra</option>
                            <option value="Karnataka">Karnataka</option>
                            <option value="Tamil Nadu">Tamil Nadu</option>
                            <option value="Kerala">Kerala</option>
                            <option value="Telangana">Telangana</option>
                            <option value="Andhra Pradesh">Andhra Pradesh</option>
                            <option value="Gujarat">Gujarat</option>
                            <option value="West Bengal">West Bengal</option>
                            <option value="Uttar Pradesh">Uttar Pradesh</option>
                            <option value="Rajasthan">Rajasthan</option>
                            <option value="Punjab">Punjab</option>
                            <option value="Haryana">Haryana</option>
                            <option value="Bihar">Bihar</option>
                            <option value="Odisha">Odisha</option>
                            <option value="Assam">Assam</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="exerciseFrequency">Exercise Frequency (days/week)</label>
                        <input type="number" id="exerciseFrequency" name="exerciseFrequency" class="form-control" min="0" max="7" placeholder="Days per week">
                    </div>
                </div>

                <h3 style="font-size: 1.25rem; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-color); color: var(--primary-color);">Background</h3>
                <div class="grid-cols-2" style="margin-bottom: 2.5rem;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="annualIncome">Annual Income (INR)</label>
                        <input type="number" id="annualIncome" name="annualIncome" class="form-control" min="0" step="1000" required placeholder="e.g. 850000">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="employment">Employment Status</label>
                        <select id="employment" name="employment" class="form-control">
                            <option value="employed">Employed (default)</option>
                            <option value="self_employed">Self Employed</option>
                            <option value="unemployed">Unemployed</option>
                            <option value="retired">Retired</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="education">Education Level</label>
                        <select id="education" name="education" class="form-control">
                            <option value="bachelor">Bachelor (default)</option>
                            <option value="high_school">High School</option>
                            <option value="master">Master</option>
                            <option value="phd">PhD</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="maritalStatus">Marital Status</label>
                        <select id="maritalStatus" name="maritalStatus" class="form-control">
                            <option value="single">Single (default)</option>
                            <option value="married">Married</option>
                            <option value="divorced">Divorced</option>
                            <option value="widowed">Widowed</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="yearsInsured">Years Insured</label>
                        <input type="number" id="yearsInsured" name="yearsInsured" class="form-control" min="0" max="50" placeholder="Years of insurance">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label">Health Score</label>
                        <input type="text" class="form-control" value="Auto-calculated from your Health Profile" readonly style="opacity: 0.7; cursor: not-allowed;">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-submit" style="width: 100%; padding: 1rem; font-size: 1.1rem;">
                    Get Prediction
                </button>
            </form>

            <div id="loaderWrap" class="loader-wrap" aria-live="polite" style="display: none; align-items: center; justify-content: center; gap: 1rem; margin-top: 2rem; padding: 1.5rem; background: var(--bg-input); border-radius: 8px; border: 1px solid var(--border-color);">
                <div style="width: 24px; height: 24px; border: 3px solid var(--border-color); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                <span style="font-weight: 500; color: var(--text-primary);">Processing your prediction...</span>
            </div>
            
            <style>
                @keyframes spin { to { transform: rotate(360deg); } }
            </style>

            <div id="result" class="animate-fade-in" style="margin-top: 2rem; display: none;"></div>
        </div>
    </main>

    <script th:inline="javascript">
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const submitButton = this.querySelector('.btn-submit');
            const loaderWrap = document.getElementById('loaderWrap');
            const resultDiv = document.getElementById('result');

            submitButton.disabled = true;
            submitButton.innerHTML = 'Predicting...';
            loaderWrap.style.display = 'flex';
            resultDiv.style.display = 'none';
            resultDiv.innerHTML = '';

            try {
                const formData = {
                    age: parseInt(document.getElementById('age').value),
                    bmi: parseFloat(document.getElementById('bmi').value),
                    gender: document.getElementById('gender').value,
                    kids: parseInt(document.getElementById('kids').value),
                    smoker: document.getElementById('smoker').value === 'true',
                    state: document.getElementById('state').value,
                    annualIncome: parseFloat(document.getElementById('annualIncome').value),
                    employment: document.getElementById('employment').value,
                    exerciseFrequency: parseInt(document.getElementById('exerciseFrequency').value) || 3,
                    education: document.getElementById('education').value,
                    maritalStatus: document.getElementById('maritalStatus').value,
                    yearsInsured: parseInt(document.getElementById('yearsInsured').value) || 0
                };

                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                const contentType = response.headers.get('content-type') || '';
                const result = contentType.includes('application/json')
                    ? await response.json()
                    : { message: `Request failed with status ${response.status}` };

                if (result.prediction !== undefined) {
                    const hasConditions = /*[[${hasConditions != null ? hasConditions : false}]]*/ false;
                    const hospitalsCount = /*[[${hospitalsCount != null ? hospitalsCount : 0}]]*/ 0;
                    const doctorsCount = /*[[${doctorsCount != null ? doctorsCount : 0}]]*/ 0;

                    let recommendationHtml = '';
                    if (hasConditions && (hospitalsCount > 0 || doctorsCount > 0)) {
                        recommendationHtml = `
                            <div style="margin-top: 2rem; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div style="background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 8px; padding: 1.25rem; text-align: left; display: flex; flex-direction: column;">
                                    <div style="font-weight: 600; color: var(--primary-color); margin-bottom: 0.25rem;">Recommended Hospitals</div>
                                    <div style="font-size: 1.25rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1rem;">${hospitalsCount} Available</div>
                                    <a href="/dashboard/recommendations" class="btn btn-secondary" style="font-size: 0.85rem; padding: 0.5rem; text-align: center; margin-top: auto; display: block;">View All</a>
                                </div>
                                <div style="background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 8px; padding: 1.25rem; text-align: left; display: flex; flex-direction: column;">
                                    <div style="font-weight: 600; color: var(--success); margin-bottom: 0.25rem;">Recommended Doctors</div>
                                    <div style="font-size: 1.25rem; font-weight: 700; color: var(--text-primary); margin-bottom: 1rem;">${doctorsCount} Available</div>
                                    <a href="/dashboard/recommendations" class="btn btn-secondary" style="font-size: 0.85rem; padding: 0.5rem; text-align: center; margin-top: auto; display: block;">View All</a>
                                </div>
                            </div>
                        `;
                    }

                    resultDiv.innerHTML = `
                        <div class="alert alert-success" style="display: flex; flex-direction: column; align-items: center; text-align: center; padding: 2rem;">
                            <h3 style="margin-bottom: 0.5rem;">Prediction Result</h3>
                            <div style="font-size: 2.5rem; font-weight: 700; color: var(--success); margin: 1rem 0;">
                                INR ${parseFloat(result.prediction).toLocaleString('en-IN', {maximumFractionDigits: 2})}
                            </div>
                            <p style="margin: 0; color: var(--text-primary);">Estimated Annual Premium</p>
                            ${recommendationHtml}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="alert alert-error">
                            <h3 style="margin-bottom: 0.5rem; color: var(--danger);">Error</h3>
                            <p style="margin: 0;">${result.message || 'An error occurred while processing your prediction'}</p>
                        </div>
                    `;
                }
                resultDiv.style.display = 'block';
                resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="alert alert-error">
                        <h3 style="margin-bottom: 0.5rem; color: var(--danger);">Error</h3>
                        <p style="margin: 0;">${error.message}</p>
                    </div>
                `;
                resultDiv.style.display = 'block';
            } finally {
                submitButton.disabled = false;
                submitButton.innerHTML = 'Get Prediction';
                loaderWrap.style.display = 'none';
            }
        });
    </script>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
