<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Register - Cost Prediction System')}"></head>
<body>
    
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="auth-wrapper">
        <div class="auth-bg-blobs">
            <div class="auth-blob blob-1"></div>
            <div class="auth-blob blob-2"></div>
        </div>

        <div class="card auth-card animate-fade-in" style="max-width: 500px;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h1 style="font-size: 1.75rem; color: var(--text-primary); margin-bottom: 0.5rem;">Create Account</h1>
                <p style="color: var(--text-secondary); font-size: 0.95rem;">Join the Cost Prediction System</p>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="form-group">
                    <label class="form-label" for="fullName">Full Name</label>
                    <input type="text" id="fullName" th:field="*{fullName}" class="form-control" placeholder="Enter your full name" required>
                    <div style="color: var(--danger); font-size: 0.8rem; margin-top: 0.25rem;" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="Choose a username" required>
                    <div style="color: var(--danger); font-size: 0.8rem; margin-top: 0.25rem;" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="Enter your email" required>
                    <div style="color: var(--danger); font-size: 0.8rem; margin-top: 0.25rem;" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Create a password" required>
                    <div style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 0.25rem;">Must be at least 6 characters</div>
                    <div style="color: var(--danger); font-size: 0.8rem; margin-top: 0.25rem;" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" placeholder="Confirm your password" required>
                    <div style="color: var(--danger); font-size: 0.8rem; margin-top: 0.25rem;" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
            </form>

            <div style="text-align: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
                <p style="color: var(--text-secondary); font-size: 0.9rem;">
                    Already have an account? <a th:href="@{/login}" style="font-weight: 600;">Sign In</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
