<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Health Profile - Cost Prediction System')}"></head>
<body>
    
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container animate-fade-in" style="max-width: 900px; margin-top: 2rem; margin-bottom: 2rem; flex: 1;">
        
        <nav aria-label="breadcrumb" style="margin-bottom: 1.5rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem;">
                <a th:href="@{/dashboard}" style="color: var(--text-secondary); text-decoration: none; transition: color 0.2s;">Dashboard</a>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                <span style="color: var(--text-primary); font-weight: 500;">Health Profile</span>
            </div>
        </nav>

        <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem;">
            <div>
                <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">My Health Profile</h1>
                <p style="color: var(--text-secondary);">Manage your health metrics and medical history</p>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="card">
            <div style="background: rgba(59, 130, 246, 0.1); border-left: 4px solid var(--primary-color); padding: 1rem; border-radius: 0 8px 8px 0; color: var(--primary-hover); font-size: 0.95rem; margin-bottom: 2rem;">
                <strong style="color: var(--primary-color);">Info:</strong> Your health information helps us recommend the best hospitals and doctors for your specific conditions.
            </div>

            <form th:action="@{/dashboard/health/update}" method="post" th:object="${healthProfile}">
                
                <h3 style="font-size: 1.25rem; margin-bottom: 1rem; color: var(--text-primary);">Existing Health Conditions</h3>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.95rem;">Select any conditions you currently have:</p>
                
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; margin-bottom: 2.5rem; background: var(--bg-input); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border-color);">
                    
                    <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer; padding: 0.5rem; border-radius: 6px; transition: background 0.2s;">
                        <input type="checkbox" id="diabetes" name="hasDiabetes" th:field="*{hasDiabetes}" value="true" style="width: 1.25rem; height: 1.25rem; accent-color: var(--primary-color); cursor: pointer;"/>
                        <span style="font-weight: 500;">Diabetes</span>
                    </label>
                    
                    <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer; padding: 0.5rem; border-radius: 6px; transition: background 0.2s;">
                        <input type="checkbox" id="hypertension" name="hasHypertension" th:field="*{hasHypertension}" value="true" style="width: 1.25rem; height: 1.25rem; accent-color: var(--primary-color); cursor: pointer;"/>
                        <span style="font-weight: 500;">Hypertension (High BP)</span>
                    </label>
                    
                    <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer; padding: 0.5rem; border-radius: 6px; transition: background 0.2s;">
                        <input type="checkbox" id="heartDisease" name="hasHeartDisease" th:field="*{hasHeartDisease}" value="true" style="width: 1.25rem; height: 1.25rem; accent-color: var(--primary-color); cursor: pointer;"/>
                        <span style="font-weight: 500;">Heart Disease</span>
                    </label>
                    
                    <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer; padding: 0.5rem; border-radius: 6px; transition: background 0.2s;">
                        <input type="checkbox" id="asthma" name="hasAsthma" th:field="*{hasAsthma}" value="true" style="width: 1.25rem; height: 1.25rem; accent-color: var(--primary-color); cursor: pointer;"/>
                        <span style="font-weight: 500;">Asthma</span>
                    </label>
                    
                    <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer; padding: 0.5rem; border-radius: 6px; transition: background 0.2s;">
                        <input type="checkbox" id="cancer" name="hasCancer" th:field="*{hasCancer}" value="true" style="width: 1.25rem; height: 1.25rem; accent-color: var(--primary-color); cursor: pointer;"/>
                        <span style="font-weight: 500;">Cancer</span>
                    </label>
                    
                    <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer; padding: 0.5rem; border-radius: 6px; transition: background 0.2s;">
                        <input type="checkbox" id="kidneyDisease" name="hasKidneyDisease" th:field="*{hasKidneyDisease}" value="true" style="width: 1.25rem; height: 1.25rem; accent-color: var(--primary-color); cursor: pointer;"/>
                        <span style="font-weight: 500;">Kidney Disease</span>
                    </label>
                    
                    <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer; padding: 0.5rem; border-radius: 6px; transition: background 0.2s;">
                        <input type="checkbox" id="arthritis" name="hasArthritis" th:field="*{hasArthritis}" value="true" style="width: 1.25rem; height: 1.25rem; accent-color: var(--primary-color); cursor: pointer;"/>
                        <span style="font-weight: 500;">Arthritis</span>
                    </label>

                </div>

                <h3 style="font-size: 1.25rem; margin-bottom: 1rem; color: var(--text-primary);">Other Conditions</h3>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label class="form-label" for="otherConditions">Please list any other health conditions or allergies:</label>
                    <textarea id="otherConditions" name="otherConditions" th:field="*{otherConditions}" class="form-control" placeholder="E.g., Thyroid issues, Allergies, Chronic pain, etc." style="min-height: 120px; resize: vertical;"></textarea>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn btn-primary" style="padding: 0.75rem 2rem;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        Save Health Profile
                    </button>
                </div>
            </form>
        </div>
    </main>
    
    <div th:replace="~{fragments/footer :: footer}"></div>

    <style>
        .checkbox-group label:hover { background: rgba(255, 255, 255, 0.05); }
        [data-theme="light"] .checkbox-group label:hover { background: rgba(0, 0, 0, 0.05); }
    </style>
</body>
</html>
