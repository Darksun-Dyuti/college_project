<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login - Cost Prediction System')}"></head>
<body>
    
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="auth-wrapper">
        <div class="auth-bg-blobs">
            <div class="auth-blob blob-1"></div>
            <div class="auth-blob blob-2"></div>
        </div>

        <div class="card auth-card animate-fade-in">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h1 style="font-size: 1.75rem; color: var(--text-primary); margin-bottom: 0.5rem;">Welcome Back</h1>
                <p style="color: var(--text-secondary); font-size: 0.95rem;">Sign in to access your dashboard</p>
            </div>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="remember-me" name="remember-me" style="accent-color: var(--primary-color); width: 1.1rem; height: 1.1rem;">
                    <label for="remember-me" style="color: var(--text-secondary); font-size: 0.9rem; margin: 0; cursor: pointer;">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Sign In</button>
            </form>

            <div style="text-align: center; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
                <p style="color: var(--text-secondary); font-size: 0.9rem;">
                    Don't have an account? <a th:href="@{/register}" style="font-weight: 600;">Create one</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
